name: Build Android Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Build release APK and AAB
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease

      - name: Resolve artifact version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(node -p "require('./app.json').expo.version")"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Collect Android artifacts
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk "artifacts/orbit-${{ steps.version.outputs.value }}-release.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "artifacts/orbit-${{ steps.version.outputs.value }}-release.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbit-android-${{ steps.version.outputs.value }}
          path: artifacts/*
          if-no-files-found: error
