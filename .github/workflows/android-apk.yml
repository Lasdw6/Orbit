name: Build Android Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

defaults:
  run:
    working-directory: apps/mobile

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Decode Android upload keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/apps/mobile/android/upload-keystore.jks"

      - name: Build release APK and AAB
        working-directory: apps/mobile/android
        run: >
          ./gradlew
          assembleRelease
          bundleRelease
          -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/apps/mobile/android/upload-keystore.jks"
          -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}"
          -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}"
          -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}"

      - name: Resolve artifact version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(node -p "require('./app.json').expo.version")"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Collect Android artifacts
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk "artifacts/orbit-${{ steps.version.outputs.value }}-release.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "artifacts/orbit-${{ steps.version.outputs.value }}-release.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbit-android-${{ steps.version.outputs.value }}
          path: apps/mobile/artifacts/*
          if-no-files-found: error
