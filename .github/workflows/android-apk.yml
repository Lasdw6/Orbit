name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Read app version
        id: version
        run: |
          echo "value=$(node -p "require('./app.json').expo.version")" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk "artifacts/orbit-${{ steps.version.outputs.value }}-release.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-apk-${{ steps.version.outputs.value }}
          path: artifacts/*.apk
          if-no-files-found: error
